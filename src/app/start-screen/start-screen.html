<div class="start-screen">
  <img
    class="start-screen__bg-controller"
    src="/assets/images/startscreen_controller.svg"
    alt=""
    aria-hidden="true"
  />

  <div class="start-screen__content">
    <p class="start-screen__subtitle">It's play time.</p>
    <h1 class="start-screen__title">Ready to Play?</h1>
    <button type="button" class="play-button" style="cursor: pointer">
      <img src="/assets/icons/controller.svg" alt="" aria-hidden="true" draggable="false" class="play-button__icon" />
      <span>Play</span>
      <svg
        class="play-button__arrow play-button__arrow--default"
        viewBox="0 0 32 24"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
      >
        <line
          x1="0"
          y1="12"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <line
          x1="22"
          y1="7"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
        <line
          x1="22"
          y1="17"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
        />
      </svg>
      <svg
        class="play-button__arrow play-button__arrow--hover"
        viewBox="0 0 32 24"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
      >
        <line
          x1="0"
          y1="12"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        />
        <line
          x1="16"
          y1="2"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        />
        <line
          x1="16"
          y1="22"
          x2="28"
          y2="12"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        />
      </svg>
    </button>
  </div>
</div>
